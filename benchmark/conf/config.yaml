defaults:
  - _self_
  - network: default

s3_bucket: ???
s3_prefix: !!null

metadata_ttl: "indefinite"

fuse_threads: !!null

# Number of processes that will be interacting with the file.
application_workers: 4

direct_io: false

hydra:
  help:
    app_name: "Mountpoint sequential read experiment runner"
  mode: MULTIRUN
  job:
    chdir: true
  sweeper:
    params:
      fuse_threads: 8, 16, 32, 64
      application_workers: 1, 4, 8, 16, 32, 64
      network: 1_nic, 2_nic, 3_nic, 4_nic
      direct_io: false, true
